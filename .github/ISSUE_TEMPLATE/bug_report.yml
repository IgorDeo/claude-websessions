name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Start websessions with `websessions --gui`
        2. Open a session in '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant terminal output, browser console errors, or screenshots.

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - install.sh (distributed binary)
        - Built from source (make build)
        - Go install
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Run `websessions --version` or check Settings page."
      placeholder: "v1.3.1"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Browser (localhost:8080)
        - GUI (--gui)
      validations:
        required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 24.04 / macOS 15.2 / Fedora 41"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser (if applicable)
      placeholder: "Chrome 131 / Firefox 134"
