name: Feature Request
description: Suggest a new feature or improvement
labels: ["feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make websessions better? Describe the problem and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's frustrating or missing today?
      placeholder: "I often need to ... but currently there's no way to ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links, or anything else that helps explain.
