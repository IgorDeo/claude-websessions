name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templates
        run: templ generate ./web/templates/

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "websessions-${SUFFIX}" \
            ./cmd/websessions

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: websessions-${{ matrix.suffix }}
          path: websessions-${{ matrix.suffix }}

  build-gui:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: gui-linux-amd64
            pkgarch: ""
          - goarch: arm64
            suffix: gui-linux-arm64
            pkgarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templates
        run: templ generate ./web/templates/

      - name: Install WebKit2GTK dev libs
        run: |
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            sudo dpkg --add-architecture arm64
            sudo apt-get update
            sudo apt-get install -y gcc-aarch64-linux-gnu libwebkit2gtk-4.1-dev:arm64 libgtk-3-dev:arm64
          else
            sudo apt-get update
            sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
          fi

      - name: Build GUI binary
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          VERSION: ${{ github.ref_name }}
          SUFFIX: ${{ matrix.suffix }}
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
          PKG_CONFIG_PATH: ${{ matrix.goarch == 'arm64' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
        run: |
          go build -tags gui -ldflags="-s -w -X main.version=${VERSION}" \
            -o "websessions-${SUFFIX}" \
            ./cmd/websessions

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: websessions-${{ matrix.suffix }}
          path: websessions-${{ matrix.suffix }}

  release:
    needs: [build, build-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in dist/*/; do
            cp "$dir"* release/
          done
          chmod +x release/websessions-*
          cd release
          for f in websessions-*; do
            sha256sum "$f" >> checksums.txt
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/websessions-*
            release/checksums.txt
